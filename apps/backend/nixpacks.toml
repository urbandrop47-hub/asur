[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm install -g pnpm@9",
  "pnpm install --frozen-lockfile --filter @asur/backend... --filter @asur/constants --filter @asur/types --filter @asur/utils --filter @asur/validations"
]

[phases.build]
cmds = [
  "pnpm --filter @asur/constants --filter @asur/types --filter @asur/utils --filter @asur/validations build",
  "pnpm -C apps/backend build"
]

[start]
cmd = "node apps/backend/dist/index.js"
